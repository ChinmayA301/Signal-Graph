[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "signalgraph-scoring"
version = "0.1.0"
description = "Heuristic scoring for SignalGraph (manipulation risk, integrity, traction)"
readme = "README.md"
requires-python = ">=3.9"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.4,<9"]

[tool.setuptools.packages.find]
where = ["."]
include = ["signalgraph_scoring*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
