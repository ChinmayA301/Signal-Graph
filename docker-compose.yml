services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: signalgraph
      POSTGRES_PASSWORD: signalgraph
      POSTGRES_DB: signalgraph
    ports:
      - "5432:5432"
    volumes:
      - signalgraph_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalgraph -d signalgraph"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    environment:
      DATABASE_URL: postgresql+psycopg://signalgraph:signalgraph@postgres:5432/signalgraph
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      MOCK_MODE: ${MOCK_MODE:-true}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      INTERNAL_API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  signalgraph_pg:
